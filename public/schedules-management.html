<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Horarios - CardioFit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="shortcut icon" href="logo.jpg" type="image/x-icon">
    <style>
        .schedule-card {
            transition: all 0.3s ease;
        }
        .schedule-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .day-badge {
            min-width: 90px;
        }
        .time-slot {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- Header -->
    <nav class="bg-gradient-to-r from-blue-900 to-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h1 class="text-xl font-bold tracking-wider">GESTION DE HORARIOS</h1>
            </div>
            <a href="/index.html" class="bg-white text-blue-900 px-4 py-2 rounded-lg font-bold hover:bg-blue-100 transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Volver al Dashboard
            </a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        
        <!-- Filtros y Acciones -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex flex-wrap gap-4 items-end justify-between">
                <div class="flex gap-4 flex-wrap items-end">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Filtrar por Entrenador</label>
                        <select id="filterStaff" class="border-2 border-gray-200 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none min-w-[200px]">
                            <option value="">Todos los Entrenadores</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Filtrar por Dia</label>
                        <select id="filterDay" class="border-2 border-gray-200 rounded-lg px-4 py-2 focus:border-blue-500 focus:outline-none">
                            <option value="">Todos los Dias</option>
                            <option value="1">Lunes</option>
                            <option value="2">Martes</option>
                            <option value="3">Miercoles</option>
                            <option value="4">Jueves</option>
                            <option value="5">Viernes</option>
                            <option value="6">Sabado</option>
                            <option value="0">Domingo</option>
                        </select>
                    </div>
                </div>
                <button onclick="openCreateModal()" 
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    Agregar Horario
                </button>
            </div>
        </div>

        <!-- Resumen de Estadisticas -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm font-bold">Total Horarios</p>
                <p class="text-3xl font-bold text-blue-600" id="statTotal">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-green-500">
                <p class="text-gray-500 text-sm font-bold">Entrenadores Activos</p>
                <p class="text-3xl font-bold text-green-600" id="statTrainers">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm font-bold">Dias con Cobertura</p>
                <p class="text-3xl font-bold text-purple-600" id="statDays">0</p>
            </div>
            <div class="bg-white rounded-xl shadow p-4 border-l-4 border-orange-500">
                <p class="text-gray-500 text-sm font-bold">Capacidad Total</p>
                <p class="text-3xl font-bold text-orange-600" id="statCapacity">0</p>
            </div>
        </div>

        <!-- Vista por Entrenador -->
        <div id="schedulesContainer" class="space-y-6">
            <!-- Los horarios se cargan aqui dinamicamente -->
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-xl shadow-lg p-12 text-center">
            <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h3 class="text-xl font-bold text-gray-600 mb-2">No hay horarios registrados</h3>
            <p class="text-gray-400 mb-4">Comienza agregando el primer horario para un entrenador</p>
            <button onclick="openCreateModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-bold">
                Agregar Primer Horario
            </button>
        </div>
    </div>

    <!-- Modal Crear/Editar Horario -->
    <div id="scheduleModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="bg-gradient-to-r from-blue-900 to-blue-700 p-5 text-white">
                <div class="flex justify-between items-center">
                    <h2 id="modalTitle" class="text-xl font-bold flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Nuevo Horario
                    </h2>
                    <button onclick="closeModal()" class="hover:bg-white/20 p-2 rounded-full transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <form id="scheduleForm" class="p-6 space-y-5">
                <input type="hidden" id="scheduleId">

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Entrenador / Staff</label>
                    <select id="staffSelect" required class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
                        <option value="">-- Seleccionar Entrenador --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Dia de la Semana</label>
                    <select id="daySelect" required class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
                        <option value="">-- Seleccionar Dia --</option>
                        <option value="1">Lunes</option>
                        <option value="2">Martes</option>
                        <option value="3">Miercoles</option>
                        <option value="4">Jueves</option>
                        <option value="5">Viernes</option>
                        <option value="6">Sabado</option>
                        <option value="0">Domingo</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Hora Inicio</label>
                        <input type="time" id="startTime" required 
                            class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Hora Fin</label>
                        <input type="time" id="endTime" required 
                            class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Capacidad Maxima (Clientes por hora)</label>
                    <input type="number" id="maxCapacity" min="1" max="20" value="5" required
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-3 focus:border-blue-500 focus:outline-none">
                    <p class="text-xs text-gray-400 mt-1">Numero maximo de clientes que pueden agendar en este horario</p>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" 
                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-lg font-bold transition">
                        Cancelar
                    </button>
                    <button type="submit" 
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                        <span id="submitBtnText">Guardar Horario</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Variables globales
        let allSchedules = [];
        let allStaff = [];

        // Mapeo de dias
        const dayNames = {
            0: 'Domingo',
            1: 'Lunes',
            2: 'Martes',
            3: 'Miercoles',
            4: 'Jueves',
            5: 'Viernes',
            6: 'Sabado'
        };

        const dayColors = {
            0: 'bg-red-100 text-red-800 border-red-200',
            1: 'bg-blue-100 text-blue-800 border-blue-200',
            2: 'bg-green-100 text-green-800 border-green-200',
            3: 'bg-yellow-100 text-yellow-800 border-yellow-200',
            4: 'bg-purple-100 text-purple-800 border-purple-200',
            5: 'bg-pink-100 text-pink-800 border-pink-200',
            6: 'bg-orange-100 text-orange-800 border-orange-200'
        };

        const roleColors = {
            'Entrenador': 'from-blue-500 to-blue-700',
            'Fisioterapia': 'from-green-500 to-green-700',
            'Spa': 'from-pink-500 to-pink-700',
            'Admin': 'from-gray-500 to-gray-700'
        };

        // Formatear hora
        function formatTime(timeStr) {
            if (!timeStr) return '';
            const [hours, minutes] = timeStr.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }

        // Cargar staff para selectores
        async function loadStaffList() {
            try {
                const res = await fetch('/api/schedules/staff-list');
                allStaff = await res.json();

                // Llenar selector del filtro
                const filterSelect = document.getElementById('filterStaff');
                const formSelect = document.getElementById('staffSelect');

                allStaff.forEach(s => {
                    const statusText = s.is_active ? '' : ' (Inactivo)';
                    filterSelect.innerHTML += `<option value="${s.id}">${s.name} - ${s.role}${statusText}</option>`;
                    formSelect.innerHTML += `<option value="${s.id}">${s.name} - ${s.role}${statusText}</option>`;
                });
            } catch (err) {
                console.error('Error cargando staff:', err);
            }
        }

        // Cargar todos los horarios
        async function loadSchedules() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('schedulesContainer');
            const emptyState = document.getElementById('emptyState');

            loader.classList.remove('hidden');
            container.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                const res = await fetch('/api/schedules/all');
                allSchedules = await res.json();

                loader.classList.add('hidden');

                if (allSchedules.length === 0) {
                    emptyState.classList.remove('hidden');
                    updateStats([]);
                    return;
                }

                renderSchedules();
                updateStats(allSchedules);
            } catch (err) {
                console.error('Error cargando horarios:', err);
                loader.classList.add('hidden');
                Swal.fire('Error', 'No se pudieron cargar los horarios', 'error');
            }
        }

        // Renderizar horarios agrupados por entrenador
        function renderSchedules() {
            const container = document.getElementById('schedulesContainer');
            const filterStaff = document.getElementById('filterStaff').value;
            const filterDay = document.getElementById('filterDay').value;

            // Filtrar
            let filtered = allSchedules;
            if (filterStaff) {
                filtered = filtered.filter(s => s.staff_id == filterStaff);
            }
            if (filterDay !== '') {
                filtered = filtered.filter(s => s.day_of_week == filterDay);
            }

            // Agrupar por entrenador
            const grouped = {};
            filtered.forEach(schedule => {
                if (!grouped[schedule.staff_id]) {
                    grouped[schedule.staff_id] = {
                        name: schedule.staff_name,
                        role: schedule.staff_role,
                        active: schedule.staff_active,
                        schedules: []
                    };
                }
                grouped[schedule.staff_id].schedules.push(schedule);
            });

            container.innerHTML = '';

            if (Object.keys(grouped).length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');

            // Renderizar cada entrenador
            for (const staffId in grouped) {
                const staff = grouped[staffId];
                const gradientClass = roleColors[staff.role] || 'from-gray-500 to-gray-700';
                const statusBadge = staff.active 
                    ? '<span class="bg-green-500 text-white text-xs px-2 py-1 rounded-full">Activo</span>'
                    : '<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full">Inactivo</span>';

                // Agrupar horarios por dia
                const byDay = {};
                staff.schedules.forEach(s => {
                    if (!byDay[s.day_of_week]) byDay[s.day_of_week] = [];
                    byDay[s.day_of_week].push(s);
                });

                let scheduleHTML = '';
                const sortedDays = Object.keys(byDay).sort((a, b) => {
                    // Ordenar: Lunes(1) a Sabado(6), Domingo(0) al final
                    const orderA = a == 0 ? 7 : parseInt(a);
                    const orderB = b == 0 ? 7 : parseInt(b);
                    return orderA - orderB;
                });

                sortedDays.forEach(day => {
                    const daySchedules = byDay[day];
                    const dayClass = dayColors[day];

                    scheduleHTML += `
                        <div class="mb-4">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="day-badge ${dayClass} px-3 py-1 rounded-full text-sm font-bold border text-center">
                                    ${dayNames[day]}
                                </span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    `;

                    daySchedules.forEach(schedule => {
                        scheduleHTML += `
                            <div class="schedule-card bg-gradient-to-br from-gray-50 to-white border border-gray-200 rounded-xl p-4 relative group">
                                <div class="flex items-center justify-between mb-2">
                                    <div class="time-slot text-white px-3 py-1 rounded-lg text-sm font-bold">
                                        ${formatTime(schedule.start_time)} - ${formatTime(schedule.end_time)}
                                    </div>
                                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="openEditModal(${schedule.id})" 
                                            class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded-lg transition" title="Editar">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                            </svg>
                                        </button>
                                        <button onclick="deleteSchedule(${schedule.id})" 
                                            class="bg-red-500 hover:bg-red-600 text-white p-2 rounded-lg transition" title="Eliminar">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2 text-gray-600 text-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                                    </svg>
                                    <span>Capacidad: <strong>${schedule.max_capacity}</strong> clientes/hora</span>
                                </div>
                            </div>
                        `;
                    });

                    scheduleHTML += '</div></div>';
                });

                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-lg overflow-hidden schedule-card">
                        <div class="bg-gradient-to-r ${gradientClass} p-5 text-white">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center">
                                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 class="text-xl font-bold">${staff.name}</h3>
                                        <p class="text-white/80 text-sm">${staff.role}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    ${statusBadge}
                                    <span class="bg-white/20 px-3 py-1 rounded-full text-sm font-bold">
                                        ${staff.schedules.length} horario(s)
                                    </span>
                                </div>
                            </div>
                        </div>
                        <div class="p-5">
                            ${scheduleHTML}
                        </div>
                    </div>
                `;
            }
        }

        // Actualizar estadisticas
        function updateStats(schedules) {
            const uniqueStaff = new Set(schedules.map(s => s.staff_id));
            const uniqueDays = new Set(schedules.map(s => s.day_of_week));
            const totalCapacity = schedules.reduce((sum, s) => sum + (s.max_capacity || 0), 0);

            document.getElementById('statTotal').textContent = schedules.length;
            document.getElementById('statTrainers').textContent = uniqueStaff.size;
            document.getElementById('statDays').textContent = uniqueDays.size;
            document.getElementById('statCapacity').textContent = totalCapacity;
        }

        // Abrir modal crear
        function openCreateModal() {
            document.getElementById('modalTitle').innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Nuevo Horario
            `;
            document.getElementById('submitBtnText').textContent = 'Guardar Horario';
            document.getElementById('scheduleId').value = '';
            document.getElementById('scheduleForm').reset();
            document.getElementById('maxCapacity').value = 5;
            document.getElementById('scheduleModal').classList.remove('hidden');
        }

        // Abrir modal editar
        function openEditModal(id) {
            const schedule = allSchedules.find(s => s.id === id);
            if (!schedule) return;

            document.getElementById('modalTitle').innerHTML = `
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                </svg>
                Editar Horario
            `;
            document.getElementById('submitBtnText').textContent = 'Actualizar Horario';
            document.getElementById('scheduleId').value = id;
            document.getElementById('staffSelect').value = schedule.staff_id;
            document.getElementById('daySelect').value = schedule.day_of_week;
            document.getElementById('startTime').value = schedule.start_time.substring(0, 5);
            document.getElementById('endTime').value = schedule.end_time.substring(0, 5);
            document.getElementById('maxCapacity').value = schedule.max_capacity;
            document.getElementById('scheduleModal').classList.remove('hidden');
        }

        // Cerrar modal
        function closeModal() {
            document.getElementById('scheduleModal').classList.add('hidden');
        }

        // Eliminar horario
        async function deleteSchedule(id) {
            const result = await Swal.fire({
                title: 'Eliminar Horario',
                text: 'Esta accion no se puede deshacer. Se eliminara este bloque de horario.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Si, Eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (!result.isConfirmed) return;

            try {
                const res = await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    Swal.fire('Eliminado', 'El horario ha sido eliminado', 'success');
                    loadSchedules();
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'No se pudo eliminar el horario', 'error');
            }
        }

        // Submit form
        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('scheduleId').value;
            const data = {
                staff_id: document.getElementById('staffSelect').value,
                day_of_week: document.getElementById('daySelect').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                max_capacity: document.getElementById('maxCapacity').value
            };

            // Validar que hora fin sea mayor que inicio
            if (data.start_time >= data.end_time) {
                Swal.fire('Error', 'La hora de fin debe ser mayor que la hora de inicio', 'error');
                return;
            }

            try {
                let res;
                if (id) {
                    res = await fetch(`/api/schedules/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    res = await fetch('/api/schedules/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                const result = await res.json();

                if (result.success) {
                    Swal.fire('Exito', result.message, 'success');
                    closeModal();
                    loadSchedules();
                } else {
                    Swal.fire('Error', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'No se pudo guardar el horario', 'error');
            }
        });

        // Eventos de filtros
        document.getElementById('filterStaff').addEventListener('change', renderSchedules);
        document.getElementById('filterDay').addEventListener('change', renderSchedules);

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            await loadStaffList();
            await loadSchedules();
        });
    </script>
</body>
</html>
